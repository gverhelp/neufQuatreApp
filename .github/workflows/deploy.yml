name: Deploy to EC2

on:
  push:
    branches:
      - prod

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_KEY }}

      - name: Deploy to EC2
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.EC2_HOST }} << 'EOF'
            cd ${{ secrets.EC2_PATH }}

            echo "Pulling latest code from prod branch"
            git reset --hard
            git pull origin prod

            echo "Rebuilding, pruning, and launching containers"
            docker-compose -f docker-compose.prod.yml build --no-cache web nginx
            docker-compose -f docker-compose.prod.yml up -d --force-recreate web nginx
            docker image prune -f

            echo "Pruning old images"
            

            echo "Deployment successful"
          EOF

